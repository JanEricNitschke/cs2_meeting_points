# This workflow will update the webpage and its content

name: webpage

on:
  schedule:
    - cron: "49 1 * * *" # Run at 1:49 AM UTC every day
  workflow_dispatch:

env:
  PYTHON_VERSION: 3.13
  SOURCE2_VIEWER_URL: https://nightly.link/ValveResourceFormat/ValveResourceFormat/workflows/build/master/cli-windows-x64.zip
  CS2_APP_ID: 730
  CARGO_TERM_COLOR: always

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  get-map-files:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: main/awpy
    outputs:
      sourceChanged: ${{ steps.check_time.outputs.sourceChanged == 'true' }}
      updateNeeded: ${{ steps.check_time.outputs.sourceChanged == 'true' && fromJSON(steps.get-maps.outputs.mapNamesToUpdate || '[]')[0] != null }}
      mapNamesToUpdate: ${{ steps.get-maps.outputs.mapNamesToUpdate || '[]' }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: main
          sparse-checkout: |
            /*
            !/spread_gifs/
            !/spread_images/
          sparse-checkout-cone-mode: false
      - name: Checkout awpy
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: JanEricNitschke/csgo
          path: main/awpy
          ref: spread-ci-branch

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        run: |
          uv python install ${{ env.PYTHON_VERSION }}

      - name: Install awpy
        shell: bash
        run: |
          uv sync --group dev --group test
          uv tool install .

      - name: Setup SteamCMD
        uses: andriivitiv/setup-steamcmd@afc45f145b95c175c3a3862d3ca84756537d48e8 # v1.3.0

      - name: Check if there is a need to update.
        id: check_time
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          # Run the update script and capture its output (expected "true" or "false")
          $sourceChanged = uv run -q --with vdf ../scripts/check_regeneration_needed.py ../scripts/last_run_time.txt
          echo "sourceChanged=$sourceChanged" >> $env:GITHUB_OUTPUT

      - name: Install Counter-Strike 2
        if: steps.check_time.outputs.sourceChanged == 'true'
        run: |
          $csDir = Join-Path (Get-Location) "cs_go"
          steamcmd +force_install_dir $csDir +login anonymous +app_update ${{ env.CS2_APP_ID }} +quit

      - name: Install Source2Viewer-CLI
        if: steps.check_time.outputs.sourceChanged == 'true'
        run: |
          Invoke-WebRequest -Uri $env:SOURCE2_VIEWER_URL -OutFile ".\cli-windows-x64.zip"
          Expand-Archive -Path .\cli-windows-x64.zip -DestinationPath . -Force

      - name: Generate Triangles
        if: steps.check_time.outputs.sourceChanged == 'true'
        run: |
          Get-ChildItem -Force
          .\scripts\generate-tris.ps1 -inputPath "cs_go\game\csgo\maps"

      - name: Generate Map Data
        if: steps.check_time.outputs.sourceChanged == 'true'
        run: |
          Get-ChildItem -Force
          .\scripts\generate-maps.ps1 -inputPath "cs_go\game\csgo"

      - name: Generate Nav
        if: steps.check_time.outputs.sourceChanged == 'true'
        run: |
          Get-ChildItem -Force
          .\scripts\generate-navs.ps1 -inputPath "cs_go\game\csgo\maps"

      - name: Generate Spawns
        if: steps.check_time.outputs.sourceChanged == 'true'
        run: |
          Get-ChildItem -Force
          .\scripts\generate-spawns.ps1 -inputPath "cs_go\game\csgo\maps"

      - name: Get map names
        id: get-maps
        if: steps.check_time.outputs.sourceChanged == 'true'
        run: |
          Get-ChildItem -Force
          mv awpy/maps/ .
          mv awpy/nav/ .
          mv awpy/spawns/ .
          mv awpy/tri/ .
          Get-ChildItem -Force
          cargo build --release
          $mapNamesToUpdate = ./target/release/cs2_meeting_points process-maps
          $mapNamesToUpdate = $mapNamesToUpdate.Trim()
          echo $mapNamesToUpdate
          echo "mapNamesToUpdate=$mapNamesToUpdate" >> $env:GITHUB_OUTPUT
        working-directory: main

      - name: Upload map files
        if: steps.check_time.outputs.sourceChanged == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: map-artifacts
          path: |
            main/nav
            main/tri
            main/maps
            main/spawns

      - name: Upload map hashes
        if: steps.check_time.outputs.sourceChanged == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hash-artifacts
          path: main/hashes/*.txt

      - name: Upload last updated time
        if: steps.check_time.outputs.sourceChanged == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: time-artifact
          path: main/scripts/last_run_time.txt

      - name: Write summary
        if: always()
        run: |
          & {
            echo "## 📊 Workflow decision"
            echo ""

            if ("${{ steps.check_time.outputs.sourceChanged }}" -ne "true") {
              echo "💤 No update required"
              echo ""
              echo "- Skipping entire pipeline"
            }
            elseif ((ConvertFrom-Json '${{ steps.get-maps.outputs.mapNamesToUpdate || '[]' }}').Length -eq 0) {
              echo "💤 No maps needed updating"
              echo ""
              echo "- Update check passed"
              echo "- No maps require regeneration"
            }
            else {
              echo "✅ Updates required"
              echo ""
              echo "Maps to process:"
              echo '${{ steps.get-maps.outputs.mapNamesToUpdate }}'
            }
          } >> $env:GITHUB_STEP_SUMMARY

  generate-plots:
    needs: get-map-files
    if: needs.get-map-files.outputs.updateNeeded == 'true'
    strategy:
      fail-fast: false
      matrix:
        map-name: ${{ fromJSON(needs.get-map-files.outputs.mapNamesToUpdate) }}
    uses: ./.github/workflows/generate-plots.yaml
    with:
      map-name: ${{ matrix.map-name }}
      python-version: 3.13
    # If you might want to use a secret in the build or test job then you would need to pass secrets, inherit disables secret isolation
    secrets: inherit
    permissions:
      contents: write

  update-last-changed:
    needs: [generate-plots, get-map-files]
    if: ${{ always() && needs.get-map-files.result == 'success' && needs.get-map-files.outputs.sourceChanged == 'true' && (needs.generate-plots.result == 'success' || needs.generate-plots.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            /*
            !/spread_gifs/
            !/spread_images/
          sparse-checkout-cone-mode: false

      - name: Retrieve hash-artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: time-artifact
          path: scripts

      - name: Commit last update time
        run: |
          git config --global user.name 'Jan-Eric Nitschke'
          git config --global user.email 'JanEricNitschke@users.noreply.github.com'
          git add scripts/last_run_time.txt
          git commit -m "Updating last run time"
          git pull --rebase origin main
          git push

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [update-last-changed, get-map-files]
    if: needs.get-map-files.outputs.updateNeeded == 'true'
    runs-on: ubuntu-latest
    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          # Upload entire repository
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
