# This workflow will build the rust project and type check the Python bindings

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            /*
            !/spread_gifs/
            !/spread_images/
          sparse-checkout-cone-mode: false
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - name: Build
        run: |
          cargo build --verbose
      - name: Lint
        run: |
          rustup component add clippy
          # Run normal configuration and fail on default warnings
          cargo clippy -- -D warnings
          # Run pedantic but do not fail
          cargo clippy --all-targets -- -W clippy::all -W clippy::pedantic -W clippy::nursery -W clippy::cargo

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Set up Python
        run: uv python install 3.13
      - name: Test
        run: cargo test --verbose
      - name: Upload test images on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-images
          path: spread_images/test_good/

  test_python_bindings:
    name: Test Python Bindings
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: |
            /*
            !/spread_gifs/
            !/spread_images/
          sparse-checkout-cone-mode: false

      - name: Print commit hash
        run: git rev-parse HEAD

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run signature test
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install maturin mypy pytest patchelf

          maturin develop
          pytest tests/
          python3 -m mypy.stubtest cs2_nav --allowlist tests/mypy-stubtest-allowlist.txt --ignore-unused-allowlist
